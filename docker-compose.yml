version: '3.8'

services:
  # Redis cache (optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: pollution-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pollution-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.production
    volumes:
      - ./backend/static:/app/static
      - ./backend/database:/app/database
      - ./backend/config:/app/config
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Vue Frontend with Nginx
  frontend:
    build:
      context: ./frontend-vue
      dockerfile: Dockerfile
    container_name: pollution-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      # Mount SSL certificates (uncomment when you have certs)
      # - ./ssl/cert.pem:/etc/nginx/ssl/cert.pem:ro
      # - ./ssl/key.pem:/etc/nginx/ssl/key.pem:ro
      - ./frontend-vue/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  redis_data:
    driver: local

networks:
  default:
    name: pollution-network
