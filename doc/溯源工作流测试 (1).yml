    - data:
        code: "from typing import Dict, Any, Optional\nimport json\n\ndef main(arg1:\
          \ str) -> Dict[str, Any]:\n    def loads_maybe(s: str):\n        try:\n\
          \            return json.loads(s)\n        except Exception:\n         \
          \   return None\n\n    def deep_extract_obj(x: Any) -> Optional[dict]:\n\
          \        \"\"\"\n        尽力从任意形态中还原到一个 dict（接口响应对象），最多 5 轮解码。\n        \"\
          \"\"\n        # 已是 dict\n        if isinstance(x, dict):\n            return\
          \ x\n\n        # 已是字符串：多轮尝试\n        if isinstance(x, str):\n          \
          \  txt = x.strip()\n            for _ in range(5):\n                # 先尝试直接\
          \ loads\n                obj = loads_maybe(txt)\n                if isinstance(obj,\
          \ dict):\n                    return obj\n                # 若不是 dict，可能本身是字符串（被再次包了一层引号）\n\
          \                if isinstance(obj, str):\n                    txt = obj.strip()\n\
          \                    continue\n                # 再尝试通过 unicode_escape 反转义一次\n\
          \                try:\n                    unesc = bytes(txt, \"utf-8\"\
          ).decode(\"unicode_escape\")\n                    # 去掉可能的多余引号\n        \
          \            if unesc.startswith('\"') and unesc.endswith('\"'):\n     \
          \                   unesc = unesc[1:-1]\n                    obj2 = loads_maybe(unesc)\n\
          \                    if isinstance(obj2, dict):\n                      \
          \  return obj2\n                    if isinstance(obj2, str):\n        \
          \                txt = obj2.strip()\n                        continue\n\
          \                except Exception:\n                    pass\n         \
          \       # 简单替换 \\\" -> \" 再试\n                txt2 = txt.replace('\\\\\"\
          ', '\"')\n                obj3 = loads_maybe(txt2)\n                if isinstance(obj3,\
          \ dict):\n                    return obj3\n                if isinstance(obj3,\
          \ str):\n                    txt = obj3.strip()\n                    continue\n\
          \                break\n            return None\n\n        # 如果是列表，无法直接提取（不是响应对象）\n\
          \        return None\n\n    def extract_public_url(obj: dict) -> Optional[str]:\n\
          \        # 直接 public_url\n        url = obj.get(\"public_url\")\n      \
          \  if isinstance(url, str) and url:\n            return url\n        # public_urls[0]\n\
          \        urls = obj.get(\"public_urls\")\n        if isinstance(urls, list)\
          \ and urls and isinstance(urls[0], str):\n            return urls[0]\n \
          \       return None\n\n    # 入口：先尝试将 arg1 解析为 dict；若是顶层对象含 body，则继续解析 body\n\
          \    obj = deep_extract_obj(arg1)\n    if isinstance(obj, dict):\n     \
          \   # 先在顶层找\n        url = extract_public_url(obj)\n        if url:\n  \
          \          return {\"result\": url}\n        # 若存在 body，则尝试从 body 再解析\n\
          \        body = obj.get(\"body\")\n        if isinstance(body, dict):\n\
          \            url = extract_public_url(body)\n            if url:\n     \
          \           return {\"result\": url}\n        if isinstance(body, str):\n\
          \            body_obj = deep_extract_obj(body)\n            if isinstance(body_obj,\
          \ dict):\n                url = extract_public_url(body_obj)\n         \
          \       if url:\n                    return {\"result\": url}\n\n    # 没有解析到，返回空字符串\n\
          \    return {\"result\": \"\"}"
