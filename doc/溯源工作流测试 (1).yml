          provider: langgenius/deepseek/deepseek
        prompt_template:
        - id: 4303b4b2-1e76-4ab6-89e4-54073f84e13d
          role: system
          text: '一、分析目标

            针对 {{#1758163255080.location#}}环境空气站开展臭氧（O₃）溯源分析，明确分析时段内该站点臭氧生成的主要贡献行业及重点企业，揭示臭氧浓度与
            OFP 的时序关联规律。

            二、提供的基础数据

            站点名称：{{#1758163255080.location#}}

            分析时段：{{#1758163255080.startime#}}-{{#1758163255080.endtime#}}

            站点臭氧浓度监测数据（单位：μg/m³）：{{#17581807184490.body#}}

            分析时段气象数据：{{#1758163292147.body#}}

            分析时段VOCs组分数据：{{#17587740956080.body#}}

            上风向企业基础数据(企业清单、经纬度、距离和污染物排放清单):{{#1758184540592.body#}}

            三、具体分析任务流程

            1.根据站点的地理信息，筛选出与其地理位置最近的一个VOC组分站，若该城市只有一个VOC组分站，则不需要进行筛选，直接选用；

            2.根据站点的污染时间段获取组分站VOCs浓度前十的数据和OFP前十的数据；

            3.根据OFP前十的数据，判断污染可能来源的行业类型；

            4.根据筛选出来的行业类型，结合上风向企业的基础信息，筛选潜在的污染来源企业；

            5.根据筛选出的潜在污染来源企业，结合企业污染物排放清单信息，筛选出VOCs排放总量前十的企业清单，若筛选出的清单数量不足10个，则全部列出。

            四、分析内容输出

            按照以下分析框架进行内容输出

            1.VOCs组分分析：①分析站点受污染时段的VOCs浓度前十物种，描述排名前5的物种类型以及浓度，并分析物种的浓度变化与臭氧的相关性；②列出站点受污染时段的OFP前十物种，分析排名前5物种的OFP贡献浓度。

            2.污染来源分析：①根据OFP前十物种，分析站点受污染的潜在来源行业；②列出潜在污染企业，以列表形式展示企业的基本信息及排放量信息。'
        selected: false
        title: VOCs溯源分析
