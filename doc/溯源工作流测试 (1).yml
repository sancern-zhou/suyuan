          role: system
          text: '我们需要对{{#1758163255080.location#}}站点的{{#1758163255080.Pollutant#}}污染高值进行溯源分析，基础分析内容包括以下：

            1、站点上风向企业分析：{{#1758184540592.body#}}

            2、站点污染浓度分析：{{#1758165172474.text#}}

            3、VOCs组分溯源分析（仅针对臭氧污染才有数据）：{{#17581743184110.text#}}

            需要对以上分析内容进行重新文字整理与润色，分析的框架与顺序如下：

            一、站点污染情况分析

            二、VOCs组分分析

            三、污染来源分析

            四、总结分析'
        selected: false
