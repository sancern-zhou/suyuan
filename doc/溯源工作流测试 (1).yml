        - id: 4303b4b2-1e76-4ab6-89e4-54073f84e13d
          role: system
          text: '一、分析目标

            针对 {{#1758163255080.location#}}环境空气站颗粒物（PM2.5、PM10）超标事件开展溯源分析，明确：① 超标时段内
            PM2.5/PM10 的主要来源（一次直接排放 / 二次转化 / 区域传输）；② 上风向区域内贡献最大的行业及重点企业；③ 气象条件对颗粒物浓度的影响，最终量化各来源的贡献占比，定位核心污染源。

            二、提供的基础数据

            站点名称：{{#1758163255080.location#}}

            分析时段：{{#1758163255080.startime#}}-{{#1758163255080.endtime#}}

            站点PM2.5/PM10 浓度监测数据（单位：μg/m³）：{{#17581807184490.body#}}

            分析时段气象数据：{{#1758163292147.body#}}

            上风向企业基础数据(企业清单、经纬度、距离和污染物排放清单):{{#1758184540592.body#}}

            三、具体分析任务要求

            1. 颗粒物来源类型解析（区分一次 / 二次 / 传输）

            一次颗粒物贡献分析：基于企业一次 PM2.5/PM10 排放量，结合 “企业与站点的距离 - 扩散衰减系数”（可采用简化模型如高斯扩散模型，或参考行业排放强度默认值），计算各企业对站点一次颗粒物的贡献浓度，汇总各行业一次贡献占比；

            二次颗粒物贡献分析：基于前体物（SO₂、NOₓ、NH₃）排放量，结合当地二次转化系数（如：SO₂转化为二次 PM2.5 的系数约 0.4-0.6，需说明系数来源，如本地环境科研报告），估算各企业
            / 行业的二次 PM2.5 贡献浓度，明确二次生成占比；

            2. 重点行业与企业贡献排序

            按 “一次贡献 + 二次贡献” 的总贡献浓度，对行业进行排序，筛选出 PM2.5/PM10 总贡献占比前 3-5 的核心行业（如：建材制造、燃煤供暖、汽车维修）；

            对核心行业内的企业，按总贡献浓度排序，确定 PM2.5 前十、PM10 前十的重点企业，标注其关键排放特征（如：某水泥厂无组织扬尘一次 PM10
            贡献占比达 15%，某化肥厂 NH₃排放导致二次 PM2.5 贡献占比达 8%）；

            分析重点企业的排放时段与超标时段的关联性（如：某钢铁厂夜间排放高峰是否对应站点清晨 PM2.5 浓度峰值）。

            3. 气象条件对超标影响分析

            绘制 “颗粒物浓度（PM2.5/PM10）- 风向风速 - 相对湿度 - 逆温层高度” 的小时序列关联图，分析气象因子的影响：如 “10:00-14:00
            出现逆温（逆温层高度 < 200m）、风速 < 1m/s，同期 PM2.5 浓度从 80μg/m³ 升至 160μg/m³，说明扩散条件差加剧超标”；

            量化气象条件的贡献：如 “若无逆温影响，颗粒物浓度预计降低 20%-30%，逆温是本次超标的重要助推因素”。

            4. 核心结论输出

            明确超标时段 PM2.5/PM10 的来源结构：如 “PM2.5 总浓度中，一次排放占 45%（建材行业占 20%、燃煤占 15%）、二次生成占
            40%（NH₃相关占 25%）、区域传输占 15%”；

            定位核心污染源：如 “PM2.5 贡献最大的企业为 XX 水泥制品厂（总贡献占比 12%，其中一次贡献 8%、二次贡献 4%），PM10 贡献最大的企业为
            XX 汽修厂（一次扬尘贡献占比 18%）”；

            指出关键影响因素：如 “本次超标是‘本地高排放（建材、燃煤）+ 二次生成（高 NH₃排放）+ 不利气象（逆温、低风速）’共同作用的结果”。

            四、输出要求

            1、报告需包含数据说明：明确数据缺失情况（如：3 家企业缺少 NH₃排放数据，可能低估二次贡献）及数据可靠性评级（如：在线监测数据为 A 级，环评报告数据为
            B 级）；

            2、需附关键图表：上风向企业分布示意图（标注重点企业）、PM2.5/PM10 来源结构饼图（一次 / 二次 / 传输）、重点行业贡献柱状图、颗粒物与气象因子时序关联图；

            3、结论需量化且可验证：避免 “某行业贡献较大” 等定性描述，需明确 “某行业总贡献占比 XX%”“某企业贡献浓度 XXμg/m³”；

            4、提出初步管控建议（可选）：如 “建议对 XX 水泥厂加强无组织扬尘治理，对 XX 化肥厂控制 NH₃排放，以降低 PM2.5 二次生成风险”。'
