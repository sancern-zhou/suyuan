    - data:
        code: "import json\nimport re\nfrom typing import Any, Dict, Tuple\n\nCN_RE\
          \ = re.compile(r\"[\\u4e00-\\u9fff]+\")\nUNICODE_KEY_CITY = r\"\\u57ce\\\
          u5e02\"   # 城市\nUNICODE_KEY_DIST = r\"\\u533a\\u53bf\"   # 区县\n\nCITY_KEYS\
          \ = (\"城市\", \"City\", \"CityName\")\nDIST_KEYS = (\"区县\", \"District\"\
          , \"DirectName\")\n\n\ndef only_cn(s: Any) -> str:\n    return \"\".join(CN_RE.findall(str(s\
          \ or \"\")))\n\n\ndef multi_unescape_unicode(s: str, rounds: int = 8) ->\
          \ str:\n    \"\"\"将可能存在的多重反斜杠 unicode 转义序列逐步还原。\n    例如：\\\\\\\\u57ce ->\
          \ \\\\u57ce -> \\u57ce -> 城\n    \"\"\"\n    if not isinstance(s, str):\n\
          \        return s\n    cur = s\n    for _ in range(rounds):\n        # 先尽量减少多余反斜杠（将\
          \ \"\\\\u\" 变成 \"\\u\"），多次迭代\n        if \"\\\\u\" in cur:\n           \
          \ cur = cur.replace(\"\\\\\\\\u\", \"\\\\u\")\n        # 再尝试 unicode_escape\
          \ 解码\n        try:\n            nxt = cur.encode(\"utf-8\", \"ignore\").decode(\"\
          unicode_escape\")\n        except Exception:\n            break\n      \
          \  if nxt == cur:\n            break\n        cur = nxt\n    return cur\n\
          \n\ndef deep_loads(x: Any, max_round: int = 20) -> Any:\n    \"\"\"逐层解析可能多重转义的\
          \ JSON 字符串；必要时做 unicode 反转义后再 loads。\"\"\"\n    cur = x\n    for _ in range(max_round):\n\
          \        if isinstance(cur, (dict, list)):\n            return cur\n   \
          \     if not isinstance(cur, str):\n            return cur\n        s =\
          \ cur.strip()\n        if not s:\n            return {}\n        # 1) 直接\
          \ loads\n        try:\n            nxt = json.loads(s)\n            if nxt\
          \ == cur:\n                return nxt\n            cur = nxt\n         \
          \   continue\n        except Exception:\n            pass\n        # 2)\
          \ 多次 unicode 反转义后再 loads\n        try:\n            unescaped = multi_unescape_unicode(s)\n\
          \            nxt2 = json.loads(unescaped)\n            cur = nxt2\n    \
          \        continue\n        except Exception:\n            return cur\n \
          \   return cur\n\n\ndef try_regex_from_raw_any(raw_any: Any) -> Tuple[str,\
          \ str]:\n    \"\"\"直接在原始文本上用正则兜底提取（无需先拿到 body）。\"\"\"\n    city = \"\"\n\
          \    dist = \"\"\n    if not isinstance(raw_any, str):\n        return city,\
          \ dist\n\n    raw = raw_any\n    raw_unescaped = multi_unescape_unicode(raw)\n\
          \n    # 先在反转义后的文本里匹配中文键\n    m1a = re.search(r'\"城市\"\\s*:\\s*\"([^\"]+)\"\
          ', raw_unescaped)\n    if m1a:\n        city = only_cn(m1a.group(1))\n \
          \   m2a = re.search(r'\"区县\"\\s*:\\s*\"([^\"]+)\"', raw_unescaped)\n   \
          \ if m2a:\n        dist = only_cn(m2a.group(1))\n\n    # 再在原文里匹配 unicode\
          \ 键并对值多次反转义\n    if not city:\n        m1u = re.search(r'\"%s\"\\s*:\\s*\"\
          ([^\"]+)\"' % UNICODE_KEY_CITY, raw)\n        if m1u:\n            city\
          \ = only_cn(multi_unescape_unicode(m1u.group(1)))\n    if not dist:\n  \
          \      m2u = re.search(r'\"%s\"\\s*:\\s*\"([^\"]+)\"' % UNICODE_KEY_DIST,\
          \ raw)\n        if m2u:\n            dist = only_cn(multi_unescape_unicode(m2u.group(1)))\n\
          \n    return city, dist\n\n\ndef extract_from_data(data: Dict[str, Any])\
          \ -> Tuple[str, str]:\n    city = \"\"\n    dist = \"\"\n    for k in CITY_KEYS:\n\
          \        if k in data:\n            city = only_cn(data.get(k))\n      \
          \      break\n    for k in DIST_KEYS:\n        if k in data:\n         \
          \   dist = only_cn(data.get(k))\n            break\n    return city, dist\n\
          \n\ndef main(arg1: Any) -> Dict[str, str]:\n    \"\"\"\n    输入：\n      -\
          \ arg1: 上游HTTP节点完整输出（包含 status_code/body/headers），或其字符串表示（哪怕层层转义）。\n   \
          \ 输出：\n      - CityName: 城市中文名（仅中文）\n      - DirectName: 区县中文名（仅中文）\n  \
          \  \"\"\"\n    # 1) 尝试结构化解析\n    resp = deep_loads(arg1)\n\n    city = \"\
          \"\n    dist = \"\"\n\n    # 2) 如果拿到 dict，优先从结构化路径解析\n    body_raw = None\n\
          \    if isinstance(resp, dict):\n        if \"body\" in resp:\n        \
          \    body_raw = resp.get(\"body\")\n            body = deep_loads(body_raw)\n\
          \        else:\n            body = resp\n            body_raw = arg1 if\
          \ isinstance(arg1, str) else json.dumps(resp, ensure_ascii=False)\n\n  \
          \      if not (isinstance(body, dict) and \"data\" in body):\n         \
          \   body = deep_loads(body)\n        data = body.get(\"data\") if isinstance(body,\
          \ dict) else {}\n        if not isinstance(data, dict):\n            data\
          \ = {}\n\n        city, dist = extract_from_data(data)\n\n    # 3) 若结构化仍为空，退回到原始文本正则兜底\n\
          \    if (not city or not dist):\n        rc, rd = try_regex_from_raw_any(arg1\
          \ if body_raw is None else body_raw)\n        city = city or rc\n      \
          \  dist = dist or rd\n        if (not city or not dist) and isinstance(arg1,\
          \ str):\n            rc2, rd2 = try_regex_from_raw_any(arg1)\n         \
          \   city = city or rc2\n            dist = dist or rd2\n\n    return {\n\
          \        \"CityName\": city,\n        \"DirectName\": dist,\n    }\n\nif\
          \ __name__ == \"__main__\":\n    # 使用你给的样例做自测\n    sample = {\n        \"\
          status_code\": 200,\n        \"body\": \"{\\n  \\\"data\\\": {\\n    \\\"\
          \\\\u4e61\\\\u9547\\\": \\\"\\\\u5357\\\\u6e90\\\\u8857\\\\u9053\\\",\\\
          n    \\\"\\\\u533a\\\\u53bf\\\": \\\"\\\\u8354\\\\u6e7e\\\\u533a\\\",\\\
          n    \\\"\\\\u57ce\\\\u5e02\\\": \\\"\\\\u5e7f\\\\u5dde\\\",\\n    \\\"\\\
          \\u7701\\\\u4efd\\\": \\\"\\\\u5e7f\\\\u4e1c\\\\u7701\\\"\\n  },\\n  \\\"\
          status\\\": \\\"success\\\"\\n}\\n\",\n    }\n    print(main(json.dumps(sample,\
          \ ensure_ascii=False)))\n"
        code_language: python3
