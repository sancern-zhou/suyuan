    - data:
        code: "import json\n\ndef main(arg1):\n    \"\"\"\n    将气象数据转换为上风向企业接口所需的winds数组格式\n\
          \n    输入：arg1 - 气象数据数组或JSON字符串（支持多重转义）\n    输出：result - winds数组的JSON字符串\n\
          \    \"\"\"\n    weather_data = arg1\n\n    # 处理多重转义：先减少反斜杠，再解析JSON\n  \
          \  for _ in range(20):\n        if isinstance(weather_data, list):\n   \
          \         break\n\n        if isinstance(weather_data, str):\n         \
          \   # 步骤1: 减少反斜杠（\\\\\\\\u 变成 \\\\u，\\\\u 变成 u）\n            if '\\\\\\\\\
          ' in weather_data:\n                weather_data = weather_data.replace('\\\
          \\\\\\', '\\\\')\n                continue\n\n            # 步骤2: 尝试JSON解析\n\
          \            try:\n                weather_data = json.loads(weather_data)\n\
          \                continue\n            except:\n                # 解析失败，尝试unicode_escape解码\n\
          \                try:\n                    weather_data = weather_data.encode('utf-8').decode('unicode_escape')\n\
          \                    continue\n                except:\n               \
          \     break\n        else:\n            break\n\n    # 确保是数组类型\n    if not\
          \ isinstance(weather_data, list):\n        return {\"result\": \"[]\"}\n\
          \n    # 转换为winds格式\n    winds = []\n    for item in weather_data:\n    \
          \    if not isinstance(item, dict):\n            continue\n\n        # 获取风向、风速和时间\n\
          \        wind_direction = item.get('windDirection')\n        wind_speed\
          \ = item.get('windSpeed')\n        time_point = item.get('timePoint')\n\n\
          \        # 过滤无效数据\n        if wind_direction is None or wind_direction >=\
          \ 360 or wind_direction < 0:\n            continue\n        if wind_speed\
          \ is None:\n            continue\n        if not time_point:\n         \
          \   continue\n\n        # 转换时间格式：从 \"2025-08-09 00:00\" 到 \"2025-08-09T00:00:00Z\"\
          \n        time_iso = str(time_point).replace(' ', 'T') + ':00Z'\n\n    \
          \    # 构建winds数组元素\n        winds.append({\n            \"time\": time_iso,\n\
          \            \"wd_deg\": float(wind_direction),\n            \"ws_ms\":\
          \ float(wind_speed)\n        })\n\n    # 转换为JSON字符串\n    result = json.dumps(winds,\
          \ ensure_ascii=False)\n\n    return {\"result\": result}\n\n\nif __name__\
          \ == \"__main__\":\n    # 测试多重转义\n    test = '[{\\\\\\\\\\\\\"cityName\\\
          \\\\\\\\\\\":\\\\\\\\\\\\\"广州\\\\\\\\\\\\\",\\\\\\\\\\\\\"timePoint\\\\\\\
          \\\\\\\":\\\\\\\\\\\\\"2025-08-09 00:00\\\\\\\\\\\\\",\\\\\\\\\\\\\"windDirection\\\
          \\\\\\\\\\\":175.0,\\\\\\\\\\\\\"windSpeed\\\\\\\\\\\\\":1.4}]'\n    print(\"\
          测试多重转义数据:\")\n    print(main(test))"
