# 社交平台配置文件
# 支持多微信账号同时登录

# 网络搜索配置
web_search:
  tencent_secret_id: "YOUR_TENCENT_SECRET_ID"  # 腾讯云WSA SecretId（优先级第一，每月免费10000次）
  tencent_secret_key: "YOUR_TENCENT_SECRET_KEY"   # 腾讯云WSA SecretKey
  firecrawl_api_key: "YOUR_FIRECRAWL_API_KEY"  # Firecrawl API Key（优先级第二，免费额度有限）

# 渠道通用配置
channels:
  send_progress: true      # 发送进度更新
  send_tool_hints: false   # 发送工具提示
  send_max_retries: 3      # 发送失败最大重试次数

# QQ配置（单账号）
qq:
  enabled: false
  allow_from: ["*"]        # 允许的用户ID列表，* 表示允许所有人

# 微信配置（多账号）
weixin:
  enabled: true
  accounts:
    # 微信账号1
    - id: "account_1"
      name: "客服机器人1号"
      base_url: "https://ilinkai.weixin.qq.com"
      token: ""                    # 登录后自动保存
      enabled: true
      allow_from: ["*"]            # * 表示允许所有人
      auto_start: true             # 服务启动时自动登录

    # 微信账号2（示例）
    - id: "account_2"
      name: "技术支持机器人"
      base_url: "https://ilinkai.weixin.qq.com"
      token: ""
      enabled: false               # 手动启用
      allow_from: ["user123", "user456"]
      auto_start: false

    # 微信账号3（示例）
    - id: "account_3"
      name: "市场推广机器人"
      base_url: "https://ilinkai.weixin.qq.com"
      token: ""
      enabled: false
      allow_from: ["*"]
      auto_start: false

# 钉钉配置（单账号）
dingtalk:
  enabled: false
  allow_from: ["*"]

# 企业微信配置（单账号）
wecom:
  enabled: false
  allow_from: ["*"]
