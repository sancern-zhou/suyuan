# Social Platform Configuration
# 大气污染溯源分析系统 - 社交平台接入配置

qq:
  enabled: false  # 启用QQ机器人
  app_id: ""  # QQ机器人App ID (从 https://qun.qq.com/ 获取)
  secret: ""  # QQ机器人App Secret
  allow_from:
    - "*"  # 允许所有人访问 (测试环境); 生产环境请指定具体用户ID
  streaming: false  # 流式响应 (暂不支持)

weixin:
  enabled: true  # 启用微信个人号机器人
  allow_from:
    - "*"  # 允许所有人访问 (测试环境)
  streaming: false

dingtalk:
  enabled: false  # 启用钉钉机器人
  app_key: ""  # 钉钉应用AppKey
  app_secret: ""  # 钉钉应用AppSecret
  allow_from:
    - "*"  # 允许所有人访问
  streaming: false

wecom:
  enabled: false  # 启用企业微信应用
  corp_id: ""  # 企业微信企业ID
  agent_id: ""  # 企业微信应用AgentID
  secret: ""  # 企业微信应用Secret
  allow_from:
    - "*"  # 允许所有人访问
  streaming: false

# 全局设置
channels:
  send_progress: true  # 发送进度更新
  send_tool_hints: false  # 发送工具调用提示
  send_max_retries: 3  # 发送失败重试次数
